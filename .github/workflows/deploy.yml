name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      #everage GitHub Actions to automatically inject the commit SHA into the HTML
      #during deployment using sed, so every deploy gets a unique version without any manual work.
      #browser will replace v1 with commit hash
      - uses: actions/checkout@v4
      - name: Inject cache-bust version
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          sed -i "s/?v=[^\"']*/?v=$COMMIT/g" index.html
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
